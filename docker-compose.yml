services:
  airflow-init:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:admin123@host.docker.internal:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin123 --firstname Admin --lastname Admin --role Admin --email admin@leclerc.com"

  airflow-webserver:
    build: .
    depends_on:
      - airflow-init
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:admin123@host.docker.internal:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./tmp:/tmp/airflow_data
      - ./sqlmesh:/opt/airflow/sqlmesh
      - C:\Users\INFOKOM\OneDrive\Bureau\PFE\POC modeles:/opt/airflow/data
    ports:
      - "8080:8080"
    command: airflow webserver
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g

  airflow-scheduler:
    build: .
    depends_on:
      - airflow-init
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:admin123@host.docker.internal:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./tmp:/tmp/airflow_data
      - ./sqlmesh:/opt/airflow/sqlmesh
      - C:\Users\INFOKOM\OneDrive\Bureau\PFE\POC modeles:/opt/airflow/data
    command: airflow scheduler
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g
