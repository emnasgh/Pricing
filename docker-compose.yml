version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: airflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    build: .
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:admin123@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LAZY_LOAD_PLUGINS: 'False'
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create --username admin --password admin123 --firstname Admin --lastname Admin --role Admin --email admin@leclerc.com
      "

  airflow-webserver:
    build: .
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:admin123@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LAZY_LOAD_PLUGINS: 'False'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./tmp:/tmp/airflow_data
      - ./sqlmesh:/opt/airflow/sqlmesh
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: airflow webserver
    restart: always

  airflow-scheduler:
    build: .
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:admin123@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LAZY_LOAD_PLUGINS: 'False'
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./tmp:/tmp/airflow_data
      - ./sqlmesh:/opt/airflow/sqlmesh
      - ./data:/opt/airflow/data
    command: airflow scheduler
    restart: always

volumes:
  postgres_data: