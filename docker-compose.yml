version: "3.8"

x-airflow-common: &airflow-common
  build: .
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:admin123@postgres:5432/airflow_db
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LAZY_LOAD_PLUGINS: 'False'
    AIRFLOW__SCHEDULER__JOB_HEARTBEAT_SEC: 30
    AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC: 10
    AIRFLOW__SCHEDULER__ZOMBIE_TASK_THRESHOLD: 600
    AIRFLOW__SCHEDULER__MAX_DAGRUNS_PER_LOOP_TO_SCHEDULE: 1
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./tmp:/tmp/airflow_data
    - ./sqlmesh:/opt/airflow/sqlmesh
    - ./data:/opt/airflow/data
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - airflow-net

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: airflow_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create --username admin --password admin123 --firstname Admin --lastname Admin --role Admin --email admin@leclerc.com || true
      "

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: airflow webserver
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    command: airflow scheduler
    restart: always
    deploy:
      resources:
        limits:
          memory: 4g

networks:
  airflow-net:
    driver: bridge

volumes:
  postgres_data: